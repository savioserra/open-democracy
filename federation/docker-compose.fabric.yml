# docker-compose.fabric.yml — Multi-org Hyperledger Fabric network for the
# open-democracy federation.
#
# This compose file brings up a 2-org Fabric network with:
#   - 3-node Raft ordering service (fault-tolerant consensus)
#   - 2 peer organizations (OpenDemocracy + ExampleGov)
#   - 1 Fabric CA per organization (issues X.509 with scope attributes)
#   - 1 open-democracy gateway per organization
#
# Prerequisites:
#   1. Generate crypto material:  ./scripts/bootstrap-network.sh
#   2. Pull Fabric images:        docker pull hyperledger/fabric-peer:2.5
#                                  docker pull hyperledger/fabric-orderer:2.5
#                                  docker pull hyperledger/fabric-ca:1.5
#   3. Start:                     docker compose -f federation/docker-compose.fabric.yml up -d
#
# To add a third organization, see scripts/add-organization.sh.

x-fabric-peer-env: &fabric-peer-env
  FABRIC_LOGGING_SPEC: INFO
  CORE_PEER_TLS_ENABLED: "true"
  CORE_PEER_PROFILE_ENABLED: "false"
  CORE_PEER_ADDRESSAUTODETECT: "false"
  CORE_VM_DOCKER_HOSTCONFIG_NETWORKMODE: federation_od-network
  CORE_CHAINCODE_EXECUTETIMEOUT: 300s

x-fabric-orderer-env: &fabric-orderer-env
  FABRIC_LOGGING_SPEC: INFO
  ORDERER_GENERAL_LISTENADDRESS: 0.0.0.0
  ORDERER_GENERAL_LISTENPORT: "7050"
  ORDERER_GENERAL_LOCALMSPID: OrdererMSP
  ORDERER_GENERAL_TLS_ENABLED: "true"
  ORDERER_GENERAL_BOOTSTRAPMETHOD: file
  ORDERER_GENERAL_BOOTSTRAPFILE: /var/hyperledger/orderer/genesis.block

networks:
  od-network:
    name: od-federation-network

volumes:
  orderer1-data:
  orderer2-data:
  orderer3-data:
  peer0-od-data:
  peer0-gov-data:
  gateway-od-data:
  gateway-gov-data:

services:

  # ═══════════════════════════════════════════════════════════════════════
  # ORDERING SERVICE (Raft cluster — 3 nodes for fault tolerance)
  # ═══════════════════════════════════════════════════════════════════════

  orderer1.od.example.com:
    image: hyperledger/fabric-orderer:2.5
    container_name: orderer1.od.example.com
    environment:
      <<: *fabric-orderer-env
      ORDERER_GENERAL_LOCALMSPDIR: /var/hyperledger/orderer/msp
      ORDERER_GENERAL_TLS_PRIVATEKEY: /var/hyperledger/orderer/tls/server.key
      ORDERER_GENERAL_TLS_CERTIFICATE: /var/hyperledger/orderer/tls/server.crt
      ORDERER_GENERAL_TLS_ROOTCAS: "[/var/hyperledger/orderer/tls/ca.crt]"
      ORDERER_GENERAL_CLUSTER_CLIENTCERTIFICATE: /var/hyperledger/orderer/tls/server.crt
      ORDERER_GENERAL_CLUSTER_CLIENTPRIVATEKEY: /var/hyperledger/orderer/tls/server.key
      ORDERER_GENERAL_CLUSTER_ROOTCAS: "[/var/hyperledger/orderer/tls/ca.crt]"
    volumes:
      - ./crypto/ordererOrganizations/od.example.com/orderers/orderer1.od.example.com/msp:/var/hyperledger/orderer/msp
      - ./crypto/ordererOrganizations/od.example.com/orderers/orderer1.od.example.com/tls:/var/hyperledger/orderer/tls
      - ./channel-artifacts/genesis.block:/var/hyperledger/orderer/genesis.block
      - orderer1-data:/var/hyperledger/production/orderer
    ports:
      - "7050:7050"
    networks:
      - od-network
    restart: unless-stopped

  orderer2.od.example.com:
    image: hyperledger/fabric-orderer:2.5
    container_name: orderer2.od.example.com
    environment:
      <<: *fabric-orderer-env
      ORDERER_GENERAL_LOCALMSPDIR: /var/hyperledger/orderer/msp
      ORDERER_GENERAL_TLS_PRIVATEKEY: /var/hyperledger/orderer/tls/server.key
      ORDERER_GENERAL_TLS_CERTIFICATE: /var/hyperledger/orderer/tls/server.crt
      ORDERER_GENERAL_TLS_ROOTCAS: "[/var/hyperledger/orderer/tls/ca.crt]"
      ORDERER_GENERAL_CLUSTER_CLIENTCERTIFICATE: /var/hyperledger/orderer/tls/server.crt
      ORDERER_GENERAL_CLUSTER_CLIENTPRIVATEKEY: /var/hyperledger/orderer/tls/server.key
      ORDERER_GENERAL_CLUSTER_ROOTCAS: "[/var/hyperledger/orderer/tls/ca.crt]"
    volumes:
      - ./crypto/ordererOrganizations/od.example.com/orderers/orderer2.od.example.com/msp:/var/hyperledger/orderer/msp
      - ./crypto/ordererOrganizations/od.example.com/orderers/orderer2.od.example.com/tls:/var/hyperledger/orderer/tls
      - ./channel-artifacts/genesis.block:/var/hyperledger/orderer/genesis.block
      - orderer2-data:/var/hyperledger/production/orderer
    ports:
      - "8050:7050"
    networks:
      - od-network
    restart: unless-stopped

  orderer3.od.example.com:
    image: hyperledger/fabric-orderer:2.5
    container_name: orderer3.od.example.com
    environment:
      <<: *fabric-orderer-env
      ORDERER_GENERAL_LOCALMSPDIR: /var/hyperledger/orderer/msp
      ORDERER_GENERAL_TLS_PRIVATEKEY: /var/hyperledger/orderer/tls/server.key
      ORDERER_GENERAL_TLS_CERTIFICATE: /var/hyperledger/orderer/tls/server.crt
      ORDERER_GENERAL_TLS_ROOTCAS: "[/var/hyperledger/orderer/tls/ca.crt]"
      ORDERER_GENERAL_CLUSTER_CLIENTCERTIFICATE: /var/hyperledger/orderer/tls/server.crt
      ORDERER_GENERAL_CLUSTER_CLIENTPRIVATEKEY: /var/hyperledger/orderer/tls/server.key
      ORDERER_GENERAL_CLUSTER_ROOTCAS: "[/var/hyperledger/orderer/tls/ca.crt]"
    volumes:
      - ./crypto/ordererOrganizations/od.example.com/orderers/orderer3.od.example.com/msp:/var/hyperledger/orderer/msp
      - ./crypto/ordererOrganizations/od.example.com/orderers/orderer3.od.example.com/tls:/var/hyperledger/orderer/tls
      - ./channel-artifacts/genesis.block:/var/hyperledger/orderer/genesis.block
      - orderer3-data:/var/hyperledger/production/orderer
    ports:
      - "9050:7050"
    networks:
      - od-network
    restart: unless-stopped

  # ═══════════════════════════════════════════════════════════════════════
  # ORGANIZATION 1: Open Democracy Foundation
  # ═══════════════════════════════════════════════════════════════════════

  ca.opendemocracy.od.example.com:
    image: hyperledger/fabric-ca:1.5
    container_name: ca.opendemocracy.od.example.com
    environment:
      FABRIC_CA_HOME: /etc/hyperledger/fabric-ca-server
      FABRIC_CA_SERVER_CA_NAME: ca-opendemocracy
      FABRIC_CA_SERVER_TLS_ENABLED: "true"
      FABRIC_CA_SERVER_PORT: "7054"
    ports:
      - "7054:7054"
    volumes:
      - ./crypto/peerOrganizations/opendemocracy.od.example.com/ca:/etc/hyperledger/fabric-ca-server
    networks:
      - od-network
    restart: unless-stopped

  peer0.opendemocracy.od.example.com:
    image: hyperledger/fabric-peer:2.5
    container_name: peer0.opendemocracy.od.example.com
    environment:
      <<: *fabric-peer-env
      CORE_PEER_ID: peer0.opendemocracy.od.example.com
      CORE_PEER_ADDRESS: peer0.opendemocracy.od.example.com:7051
      CORE_PEER_LISTENADDRESS: 0.0.0.0:7051
      CORE_PEER_CHAINCODEADDRESS: peer0.opendemocracy.od.example.com:7052
      CORE_PEER_CHAINCODELISTENADDRESS: 0.0.0.0:7052
      CORE_PEER_GOSSIP_BOOTSTRAP: peer0.opendemocracy.od.example.com:7051
      CORE_PEER_GOSSIP_EXTERNALENDPOINT: peer0.opendemocracy.od.example.com:7051
      CORE_PEER_LOCALMSPID: OpenDemocracyMSP
      CORE_PEER_TLS_CERT_FILE: /etc/hyperledger/fabric/tls/server.crt
      CORE_PEER_TLS_KEY_FILE: /etc/hyperledger/fabric/tls/server.key
      CORE_PEER_TLS_ROOTCERT_FILE: /etc/hyperledger/fabric/tls/ca.crt
      CORE_PEER_MSPCONFIGPATH: /etc/hyperledger/fabric/msp
    volumes:
      - ./crypto/peerOrganizations/opendemocracy.od.example.com/peers/peer0.opendemocracy.od.example.com/msp:/etc/hyperledger/fabric/msp
      - ./crypto/peerOrganizations/opendemocracy.od.example.com/peers/peer0.opendemocracy.od.example.com/tls:/etc/hyperledger/fabric/tls
      - peer0-od-data:/var/hyperledger/production
      - /var/run/docker.sock:/var/run/docker.sock
    ports:
      - "7051:7051"
    networks:
      - od-network
    depends_on:
      - orderer1.od.example.com
    restart: unless-stopped

  gateway.opendemocracy:
    build:
      context: ..
      dockerfile: Dockerfile
    image: open-democracy-gateway:latest
    container_name: gateway.opendemocracy
    environment:
      GATEWAY_ADDR: ":8080"
      GATEWAY_DATA: "/data"
      GATEWAY_USER: "savio"
    volumes:
      - gateway-od-data:/data
    ports:
      - "8080:8080"
    networks:
      - od-network
    depends_on:
      - peer0.opendemocracy.od.example.com
    restart: unless-stopped

  # ═══════════════════════════════════════════════════════════════════════
  # ORGANIZATION 2: Example Government
  # ═══════════════════════════════════════════════════════════════════════

  ca.examplegov.od.example.com:
    image: hyperledger/fabric-ca:1.5
    container_name: ca.examplegov.od.example.com
    environment:
      FABRIC_CA_HOME: /etc/hyperledger/fabric-ca-server
      FABRIC_CA_SERVER_CA_NAME: ca-examplegov
      FABRIC_CA_SERVER_TLS_ENABLED: "true"
      FABRIC_CA_SERVER_PORT: "7054"
    ports:
      - "8054:7054"
    volumes:
      - ./crypto/peerOrganizations/examplegov.od.example.com/ca:/etc/hyperledger/fabric-ca-server
    networks:
      - od-network
    restart: unless-stopped

  peer0.examplegov.od.example.com:
    image: hyperledger/fabric-peer:2.5
    container_name: peer0.examplegov.od.example.com
    environment:
      <<: *fabric-peer-env
      CORE_PEER_ID: peer0.examplegov.od.example.com
      CORE_PEER_ADDRESS: peer0.examplegov.od.example.com:7051
      CORE_PEER_LISTENADDRESS: 0.0.0.0:7051
      CORE_PEER_CHAINCODEADDRESS: peer0.examplegov.od.example.com:7052
      CORE_PEER_CHAINCODELISTENADDRESS: 0.0.0.0:7052
      CORE_PEER_GOSSIP_BOOTSTRAP: peer0.examplegov.od.example.com:7051
      CORE_PEER_GOSSIP_EXTERNALENDPOINT: peer0.examplegov.od.example.com:7051
      CORE_PEER_LOCALMSPID: ExampleGovMSP
      CORE_PEER_TLS_CERT_FILE: /etc/hyperledger/fabric/tls/server.crt
      CORE_PEER_TLS_KEY_FILE: /etc/hyperledger/fabric/tls/server.key
      CORE_PEER_TLS_ROOTCERT_FILE: /etc/hyperledger/fabric/tls/ca.crt
      CORE_PEER_MSPCONFIGPATH: /etc/hyperledger/fabric/msp
    volumes:
      - ./crypto/peerOrganizations/examplegov.od.example.com/peers/peer0.examplegov.od.example.com/msp:/etc/hyperledger/fabric/msp
      - ./crypto/peerOrganizations/examplegov.od.example.com/peers/peer0.examplegov.od.example.com/tls:/etc/hyperledger/fabric/tls
      - peer0-gov-data:/var/hyperledger/production
      - /var/run/docker.sock:/var/run/docker.sock
    ports:
      - "9051:7051"
    networks:
      - od-network
    depends_on:
      - orderer1.od.example.com
    restart: unless-stopped

  gateway.examplegov:
    build:
      context: ..
      dockerfile: Dockerfile
    image: open-democracy-gateway:latest
    container_name: gateway.examplegov
    environment:
      GATEWAY_ADDR: ":8080"
      GATEWAY_DATA: "/data"
      GATEWAY_USER: "mayor"
    volumes:
      - gateway-gov-data:/data
    ports:
      - "9080:8080"
    networks:
      - od-network
    depends_on:
      - peer0.examplegov.od.example.com
    restart: unless-stopped
